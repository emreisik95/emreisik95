name: Generate Snake

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: Platane/snk/svg-only@v3
        with:
          github_user_name: emreisik95
          outputs: |
            dist/snake.svg?color_snake=#1F6FEB&color_dots=#EBF5FF,#79B8FF,#4492F7,#2563EB,#0F172A
            dist/snake-dark.svg?color_snake=#58A6FF&color_dots=#0D1117,#0A1A40,#0D2F7A,#1F6FEB,#58A6FF

      - uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
