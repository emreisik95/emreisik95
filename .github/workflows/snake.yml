name: Generate Snake

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: Platane/snk/svg-only@v3
        with:
          github_user_name: emreisik95
          outputs: |
            dist/snake.svg?color_snake=#3B82F6&color_dots=#E0F2FE,#34D399,#10B981,#3B82F6,#1E3A8A
            dist/snake-dark.svg?palette=github-dark&color_snake=#10B981&color_dots=#0F172A,#10B981,#3B82F6,#22D3EE,#1E3A8A

      - uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
