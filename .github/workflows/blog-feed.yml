name: Latest Blog Posts

on:
  schedule:
    - cron: "0 */4 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  update-readme:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: gautamkrishnar/blog-post-workflow@v1
        with:
          feed_list: "https://emreisik.dev/feed"
          max_post_count: 5
          template: "<li><a href=\"$url\">$title</a> — $date</li>"
          date_format: "mmm d, yyyy"
          commit_message: "chore: refresh latest blog posts"
